<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书素材生成器 · Human Tokenizer</title>
<style>
  body { background: #0f1115; color: #e8e6e1; font-family: -apple-system, "PingFang SC", sans-serif; max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  p.note { color: #8b8fa3; font-size: 0.85rem; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .cell { text-align: center; }
  canvas { width: 100%; border-radius: 10px; border: 1px solid #2a2e3a; }
  button { margin-top: 8px; background: #ffb454; color: #1a1500; border: none; border-radius: 8px; padding: 8px 18px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<h1>小红书素材生成器</h1>
<p class="note">全部 1242×1656（3:4 小红书标准）。点「下载」保存 PNG。数字基于 data/pricing.json 2026-07-11 数据，示例前提：一周产出约 5 万 tokens。</p>
<div class="grid" id="grid"></div>

<script>
const W = 1242, H = 1656;
const C = { bg1:'#0f1115', bg2:'#1c1408', panel:'#181b22', text:'#e8e6e1', muted:'#8b8fa3', accent:'#ffb454', green:'#4ade80', red:'#f87171', line:'#23262f' };
const FONT = (w,s,serif) => `${w} ${s}px ${serif?'Georgia,"Songti SC",serif':'-apple-system,"PingFang SC","Noto Sans SC",sans-serif'}`;

function base(ctx, footer=true) {
  const g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,C.bg1); g.addColorStop(1,C.bg2);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = C.line; ctx.lineWidth = 10; ctx.strokeRect(0,0,W,H);
  ctx.fillStyle = C.muted; ctx.font = FONT(500,42);
  ctx.fillText('HUMAN TOKENIZER', 90, 140);
  if (footer) {
    ctx.fillStyle = C.muted; ctx.font = FONT(500,40); ctx.textAlign = 'center';
    ctx.fillText('🔍 搜索 human-tokenizer · 免费 · 开源 · 无广告', W/2, H-90);
    ctx.textAlign = 'left';
  }
}

function wrap(ctx, text, x, y, maxW, lineH) {
  let line = '';
  for (const ch of [...text]) {
    if (ctx.measureText(line + ch).width > maxW && line) { ctx.fillText(line, x, y); line = ch; y += lineH; }
    else line += ch;
  }
  if (line) ctx.fillText(line, x, y);
  return y;
}

// ① 封面
function cover(ctx) {
  base(ctx);
  ctx.textAlign = 'center';
  ctx.font = '220px serif'; ctx.fillText('🤖', W/2, 520);
  ctx.fillStyle = C.text; ctx.font = FONT(800,130);
  ctx.fillText('你的工作', W/2, 740);
  ctx.fillStyle = C.accent; ctx.font = FONT(800,150);
  ctx.fillText('值几个 token？', W/2, 920);
  ctx.fillStyle = C.muted; ctx.font = FONT(500,54);
  ctx.fillText('把日报周报 PRD 粘进去', W/2, 1080);
  ctx.fillText('算算 AI 干这活要花几毛钱', W/2, 1160);
  ctx.fillStyle = C.red; ctx.font = FONT(700,60);
  ctx.fillText('测完我沉默了…', W/2, 1330);
  ctx.textAlign = 'left';
}

// ② 金句卡
function punchline(ctx) {
  base(ctx);
  ctx.fillStyle = C.muted; ctx.font = FONT(500,52);
  ctx.fillText('填上月薪之后——', 90, 420);
  ctx.fillStyle = C.text; ctx.font = FONT(800,105);
  ctx.fillText('你比 Opus 贵', 90, 620);
  ctx.fillStyle = C.accent; ctx.font = FONT(800,260);
  ctx.fillText('1,800', 90, 880);
  ctx.fillStyle = C.text; ctx.font = FONT(800,105);
  ctx.fillText('倍', 780, 880);
  ctx.fillStyle = C.muted; ctx.font = FONT(500,58);
  let y = wrap(ctx, '但你不能并发，还要交社保。', 90, 1060, W-180, 84);
  ctx.fillStyle = C.green; ctx.font = FONT(600,50);
  wrap(ctx, '（也可能算出你比 API 还便宜——那就快去要求涨薪）', 90, y+140, W-180, 72);
}

// ③ 数据卡：同一份周报的报价
function bill(ctx) {
  base(ctx);
  ctx.fillStyle = C.text; ctx.font = FONT(800,84);
  ctx.fillText('同一周的产出，各家 AI 报价', 90, 400);
  ctx.fillStyle = C.muted; ctx.font = FONT(500,46);
  ctx.fillText('（约 5 万 tokens，按输出价计）', 90, 480);
  const rows = [
    ['DeepSeek V4 Flash', '¥0.10', 0.1/65],
    ['MiMo V2.5', '¥0.10', 0.1/65],
    ['Kimi K2.6', '¥1.35', 1.35/65],
    ['Claude Opus 4.8', '¥9.00', 9/65],
    ['GPT-5.5 Pro', '¥65', 1],
  ];
  let y = 640;
  for (const [name, cost, frac] of rows) {
    ctx.fillStyle = C.text; ctx.font = FONT(600,52);
    ctx.fillText(name, 90, y);
    ctx.fillStyle = C.line;
    roundRect(ctx, 90, y+28, W-180, 26, 13); ctx.fill();
    ctx.fillStyle = C.accent;
    roundRect(ctx, 90, y+28, Math.max(20,(W-180)*frac), 26, 13); ctx.fill();
    ctx.fillStyle = C.accent; ctx.font = FONT(800,52); ctx.textAlign = 'right';
    ctx.fillText(cost, W-90, y);
    ctx.textAlign = 'left';
    y += 170;
  }
  ctx.fillStyle = C.red; ctx.font = FONT(700,56);
  ctx.fillText('最便宜和最贵，差 648 倍。', 90, y+40);
}

// ④ 玩法卡
function howto(ctx) {
  base(ctx);
  ctx.fillStyle = C.text; ctx.font = FONT(800,90);
  ctx.fillText('怎么玩', 90, 400);
  const steps = [
    ['①', '投喂', '粘贴你的日报 / 周报 / PRD / 代码'],
    ['②', '账单', '11 家大模型报价 + 订阅额度消耗'],
    ['③', '对决', '填月薪，算你比模型贵多少倍'],
    ['④', '战报', '生成卡片，发到群里引战'],
  ];
  let y = 560;
  for (const [n, tt, dd] of steps) {
    ctx.fillStyle = C.accent; ctx.font = FONT(800,80);
    ctx.fillText(n, 90, y);
    ctx.fillStyle = C.text; ctx.font = FONT(800,72);
    ctx.fillText(tt, 210, y);
    ctx.fillStyle = C.muted; ctx.font = FONT(500,50);
    wrap(ctx, dd, 210, y+80, W-300, 68);
    y += 230;
  }
  ctx.fillStyle = C.green; ctx.font = FONT(600,52);
  ctx.fillText('还能选「你是哪家模型的人类版」换皮肤', 90, y+30);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

const cards = [
  ['封面：值几个token', cover],
  ['金句：贵1800倍', punchline],
  ['数据：648倍价差', bill],
  ['玩法：四步', howto],
];
const grid = document.getElementById('grid');
cards.forEach(([name, draw], i) => {
  const cell = document.createElement('div');
  cell.className = 'cell';
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  draw(cv.getContext('2d'));
  const btn = document.createElement('button');
  btn.textContent = '下载 ' + name;
  btn.onclick = () => {
    const a = document.createElement('a');
    a.href = cv.toDataURL('image/png');
    a.download = `xhs-${i+1}.png`;
    a.click();
  };
  cell.append(cv, btn);
  grid.append(cell);
});
</script>
</body>
</html>
