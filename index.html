<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Tokenizer</title>
  <meta name="description" content="把你的工作换算成大模型的 token 账单">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-row">
      <h1 data-i18n="title">Human Tokenizer</h1>
      <button id="lang-toggle" class="lang-btn" data-i18n="lang_toggle">EN</button>
    </div>
    <p class="tagline" data-i18n="tagline"></p>
    <div class="identity-row">
      <span class="identity-label" data-i18n="identity_label"></span>
      <div id="identity-chips" class="chips"></div>
    </div>
  </header>

  <main>
    <!-- ① 投喂 -->
    <section class="input-section">
      <label for="work-input" data-i18n="input_label"></label>
      <textarea id="work-input" rows="8" data-i18n-ph="input_placeholder"></textarea>
      <div class="upload-row">
        <button id="upload-btn" class="ghost-btn" data-i18n="upload_btn"></button>
        <input type="file" id="file-input" multiple hidden>
        <span class="sub-note" data-i18n="upload_hint"></span>
      </div>
      <p id="upload-status" class="sub-note"></p>
      <details id="feed-details" class="feed-details">
        <summary data-i18n="feed_toggle"></summary>
        <textarea id="feed-input" rows="5" data-i18n-ph="feed_placeholder"></textarea>
        <p class="sub-note" data-i18n="feed_note"></p>
      </details>
      <button id="calc-btn" class="primary-btn" data-i18n="calc_btn"></button>
    </section>

    <p id="empty-hint" class="sub-note hidden" data-i18n="empty_hint"></p>

    <section id="results" class="hidden">
      <div class="token-hero">
        <div id="mascot" class="mascot" aria-hidden="true">🤖</div>
        <div id="token-count" class="big-number"></div>
        <div id="char-count" class="sub-note"></div>
        <div id="throughput-line" class="throughput-line hidden"></div>
      </div>

      <!-- ② 账单 -->
      <p class="step-cap" data-i18n="step_bill_cap"></p>
      <div class="tabs">
        <button id="tab-api" class="tab active" data-i18n="tab_api"></button>
        <button id="tab-plans" class="tab" data-i18n="tab_plans"></button>
      </div>
      <div id="panel-api" class="result-block">
        <p class="sub-note" id="api-note" data-i18n="section_api_note"></p>
        <div id="api-table"></div>
      </div>
      <div id="panel-plans" class="result-block hidden">
        <p class="sub-note"><span class="badge" data-i18n="estimate_badge"></span> <span data-i18n="section_plans_note"></span></p>
        <ul id="plans-list"></ul>
      </div>

      <!-- ③ 对决 -->
      <div class="result-block duel-block">
        <div id="taunt-box" class="taunt hidden" aria-hidden="true"></div>
        <h2 data-i18n="section_duel"></h2>
        <div class="vs-row" aria-hidden="true">
          <span class="fighter">🧑‍💻</span><span class="vs-badge">VS</span><span class="fighter bot">🤖</span>
        </div>
        <div class="opts-row duel-form">
          <div class="opt">
            <label for="salary-input" data-i18n="salary_label"></label>
            <div class="salary-row">
              <select id="salary-currency">
                <option value="CNY">¥</option>
                <option value="USD">$</option>
              </select>
              <input type="number" id="salary-input" min="0" data-i18n-ph="salary_placeholder">
            </div>
          </div>
          <div class="opt">
            <label for="hours-input" data-i18n="hours_label"></label>
            <input type="number" id="hours-input" min="0" step="0.5" data-i18n-ph="hours_placeholder">
          </div>
        </div>
        <div id="duel-box">
          <p class="sub-note" data-i18n="duel_hint"></p>
        </div>
      </div>

      <!-- ④ 战报 -->
      <div class="share-section">
        <button id="share-btn" class="primary-btn" data-i18n="share_btn"></button>
      </div>
    </section>
  </main>

  <footer>
    <p class="sub-note" data-i18n="footer_note"></p>
    <p class="sub-note"><a href="https://github.com/leesieg/human-tokenizer" id="repo-link">GitHub</a> · <span id="data-date"></span></p>
  </footer>

  <!-- 分享卡片弹层 -->
  <div id="card-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <button id="card-close" class="modal-close" aria-label="close">×</button>
      <img id="card-img" alt="share card">
      <p class="sub-note" data-i18n="share_download"></p>
      <button id="card-save" class="primary-btn" data-i18n="card_save_btn"></button>
    </div>
  </div>
  <canvas id="share-card" width="1080" height="1350" class="hidden" aria-hidden="true"></canvas>

  <script src="vendor/gpt-tokenizer-o200k_base.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
